<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAREKODOTO | Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box { background: #111; padding: 40px; border-radius: 30px; border: 1px solid #222; text-align: center; width: 85%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 20px; letter-spacing: 5px; color: #d4af37; margin-bottom: 30px; font-weight: 900; }
        p { font-size: 13px; color: #777; margin-bottom: 25px; line-height: 1.6; }
        input { width: 100%; padding: 18px; background: #000; border: 1px solid #333; border-radius: 18px; color: #d4af37; font-size: 28px; text-align: center; letter-spacing: 8px; margin-bottom: 20px; font-weight: 900; outline: none; }
        input:focus { border-color: #d4af37; }
        button { width: 100%; padding: 20px; background: linear-gradient(135deg, #d4af37, #f2d06b); border: none; border-radius: 18px; font-weight: 900; cursor: pointer; color: #000; text-transform: uppercase; font-size: 14px; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .error { color: #ff4444; font-size: 12px; margin-top: 15px; display: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>KAREKOD<span style="color:white">OTO</span></h1>
    <p>Ürününüzü aktif etmek için kartın arkasındaki <b>6 haneli güvenlik kodunu</b> giriniz.</p>
    <input type="tel" id="pincode" maxlength="6" placeholder="000000" autocomplete="off">
    <button onclick="checkPin()">SİSTEMİ AKTİF ET</button>
    <div id="error-msg" class="error">❌ Hatalı Kod! Lütfen kartın üzerindeki kodu kontrol edin.</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { doc, getDoc, getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCujO03_fQ6xQ3qzzl8TfXazbCNHy0TukI",
      authDomain: "karekod-oto.firebaseapp.com",
      projectId: "karekod-oto",
      storageBucket: "karekod-oto.firebasestorage.app",
      appId: "1:899053328801:web:1076904672226ae01513e0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.checkPin = async function() {
        const pinInput = document.getElementById('pincode').value;
        const errorMsg = document.getElementById('error-msg');
        const btn = document.querySelector('button');
        
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if(!code) { alert("Hata: QR Kod ID okunamadı!"); return; }
        if(pinInput.length < 6) { errorMsg.innerText = "Lütfen 6 haneli kodu eksiksiz girin."; errorMsg.style.display = 'block'; return; }

        try {
            btn.innerText = "KONTROL EDİLİYOR...";
            btn.disabled = true;

            const docRef = doc(db, "qr_codes", code);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists() && docSnap.data().activationCode == pinInput) {
                // Şifre doğru! Profil sayfasına uçuruyoruz
                window.location.href = `profil-olustur.html?code=${code}&status=verified`;
            } else {
                errorMsg.innerText = "❌ Hatalı Kod! Lütfen tekrar deneyin.";
                errorMsg.style.display = 'block';
                btn.innerText = "SİSTEMİ AKTİF ET";
                btn.disabled = false;
            }
        } catch (e) {
            console.error("Hata:", e);
            alert("Bağlantı hatası oluştu!");
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
