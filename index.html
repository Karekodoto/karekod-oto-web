<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karekod Oto | VIP Profil</title>
    <style>
        :root { --gold: #d4af37; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        
        /* Arka Plan Videosu */
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; opacity: 0.4; filter: blur(3px); }

        .overlay { height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; }
        
        .card { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.3); padding: 40px; border-radius: 35px; width: 85%; max-width: 380px; text-align: center; color: white; box-shadow: 0 20px 50px rgba(0,0,0,1); }
        
        .logo-img { width: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--gold)); }
        h1 { font-size: 26px; margin: 5px 0; letter-spacing: 1px; }
        .plate { background: white; color: black; padding: 5px 20px; border-radius: 8px; font-weight: 900; font-size: 22px; display: inline-block; border: 2px solid #000; margin: 15px 0; position: relative; }
        .plate::before { content: "TR"; position: absolute; left: 0; top: 0; bottom: 0; background: #003399; color: white; font-size: 10px; padding: 5px 2px; border-radius: 5px 0 0 5px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .btn { padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-call { background: var(--gold); color: black; }
        .btn-wp { background: #25d366; color: white; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-fast-driving-in-a-city-at-night-11756-large.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <div class="card" id="profileCard" style="display:none;">
            <div id="brandLogo"></div>
            <h1 id="uName">Sürücü</h1>
            <div class="plate" id="uPlate">00 ABC 00</div>
            <p id="uModel" style="color: #ccc;"></p>

            <div class="btn-group">
                <a href="#" id="callBtn" class="btn btn-call">📞 ŞİMDİ ARA</a>
                <a href="#" id="wpBtn" class="btn btn-wp">💬 WHATSAPP'TAN YAZ</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuj003_fQ6XQ3qzzl8TfXazbCNHy0TukI",
            databaseURL: "https://karekod-oto-default-rtdb.europe-west1.firebasedatabase.app",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('id') || "123456";

        get(ref(db, 'aktivasyon_kodlari/' + code)).then((snap) => {
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('uName').innerText = d.sahibi;
                document.getElementById('uPlate').innerText = d.plaka;
                document.getElementById('uModel').innerText = d.arac_model;
                document.getElementById('callBtn').href = "tel:" + d.telefon;
                document.getElementById('wpBtn').href = "https://wa.me/9" + d.telefon;

                // Dinamik Logo Ayarı (Örn: Passat yazıyorsa VW logosu)
                if(d.arac_model.toLowerCase().includes("passat") || d.arac_model.toLowerCase().includes("vw")) {
                    document.getElementById('brandLogo').innerHTML = '<img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg" class="logo-img">';
                }

                document.getElementById('profileCard').style.display = 'block';
            }
        });
    </script>
</body>
</html>
