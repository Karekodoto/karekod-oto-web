<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAREKODOTO | Kontrol</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #111; border-top: 4px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .login-box { display: none; background: #111; padding: 40px; border-radius: 30px; border: 1px solid #222; text-align: center; width: 85%; max-width: 400px; }
        h1 { font-size: 20px; letter-spacing: 5px; color: #d4af37; margin-bottom: 30px; }
        input { width: 100%; padding: 18px; background: #000; border: 1px solid #333; border-radius: 18px; color: #d4af37; font-size: 28px; text-align: center; letter-spacing: 8px; margin-bottom: 20px; outline: none; }
        button { width: 100%; padding: 20px; background: linear-gradient(135deg, #d4af37, #f2d06b); border: none; border-radius: 18px; font-weight: 900; cursor: pointer; color: #000; text-transform: uppercase; }
        .error { color: #ff4444; font-size: 12px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader"></div>
</div>

<div id="login-box" class="login-box">
    <h1>KAREKOD<span style="color:white">OTO</span></h1>
    <p style="color:#777; font-size:13px;">Bu ürün henüz aktif edilmemiş. Şifreyi girerek profilinizi oluşturun.</p>
    <input type="tel" id="pincode" maxlength="6" placeholder="000000">
    <button onclick="checkPin()">SİSTEMİ AKTİF ET</button>
    <div id="error-msg" class="error">❌ Hatalı Kod!</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { doc, getDoc, getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCujO03_fQ6xQ3qzzl8TfXazbCNHy0TukI",
      authDomain: "karekod-oto.firebaseapp.com",
      projectId: "karekod-oto",
      storageBucket: "karekod-oto.firebasestorage.app",
      appId: "1:899053328801:web:1076904672226ae01513e0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    async function akilliKontrol() {
        if(!code) { alert("QR Kod geçersiz!"); return; }

        try {
            const docRef = doc(db, "qr_codes", code);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                // EĞER TELEFON KAYITLIYSA DİREKT PROFİLE GİT
                if (data.phone && data.phone !== "") {
                    window.location.href = `profil.html?code=${code}`;
                } else {
                    // KAYITLI DEĞİLSE ŞİFRE EKRANINI GÖSTER
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('login-box').style.display = 'block';
                }
            } else {
                alert("Bu karekod veritabanında tanımlı değil!");
            }
        } catch (e) {
            console.error(e);
        }
    }

    // Şifre Kontrol Fonksiyonu
    window.checkPin = async function() {
        const pinInput = document.getElementById('pincode').value;
        const docRef = doc(db, "qr_codes", code);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists() && docSnap.data().activationCode == pinInput) {
            window.location.href = `profil-olustur.html?code=${code}&status=verified`;
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    };

    akilliKontrol();
</script>
</body>
</html>
