<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karekod Oto | Sürücü Profili</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body { background-color: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 1px solid var(--gold); padding: 40px; border-radius: 30px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { color: var(--gold); font-size: 14px; letter-spacing: 3px; margin-bottom: 30px; }
        .profile-img { width: 80px; height: 80px; background: #222; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--gold); }
        h1 { font-size: 24px; margin: 10px 0; }
        .plate { background: var(--gold); color: black; padding: 5px 15px; border-radius: 5px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .info { color: #aaa; margin-bottom: 30px; }
        .call-btn { display: block; background: #25d366; color: white; text-decoration: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .call-btn:hover { transform: scale(1.05); }
        #loading { font-size: 14px; color: var(--gold); }
    </style>
</head>
<body>

    <div class="card" id="mainCard" style="display:none;">
        <div class="logo">KAREKOD OTO</div>
        <div class="profile-img">👤</div>
        <h1 id="displayName">Yükleniyor...</h1>
        <div class="plate" id="displayPlate">---</div>
        <p class="info" id="displayModel">Araç Bilgisi</p>
        
        <a href="#" id="callLink" class="call-btn">SÜRÜCÜYÜ ARA</a>
    </div>

    <div id="loading">Profil Bilgileri Getiriliyor...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuj003_fQ6XQ3qzzl8TfXazbCNHy0TukI",
            authDomain: "karekod-oto.firebaseapp.com",
            databaseURL: "https://karekod-oto-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "karekod-oto",
            storageBucket: "karekod-oto.firebasestorage.app",
            messagingSenderId: "899053328801",
            appId: "1:899053328801:web:1076904672226ae01513e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // QR kodun içindeki ID'yi al (Örn: karekodoto.com/?id=123456)
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('id') || "123456"; 

        const userRef = ref(db, 'aktivasyon_kodlari/' + code);
        get(userRef).then((snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                document.getElementById('displayName').innerText = data.sahibi;
                document.getElementById('displayPlate').innerText = data.plaka;
                document.getElementById('displayModel').innerText = data.arac_model;
                document.getElementById('callLink').href = "tel:" + data.telefon;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainCard').style.display = 'block';
            } else {
                document.getElementById('loading').innerText = "Profil bulunamadı.";
            }
        });
    </script>
</body>
</html>
