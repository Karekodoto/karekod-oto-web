<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Karekod Oto | ADMIN PANEL</title>
    <style>
        :root { --gold: #d4af37; }
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #login-screen { text-align: center; background: #111; padding: 40px; border-radius: 20px; border: 1px solid var(--gold); width: 350px; }
        #admin-panel { display: none; background: #111; border: 2px solid var(--gold); padding: 30px; border-radius: 20px; width: 500px; box-shadow: 0 0 30px rgba(212,175,55,0.15); }
        h2 { color: var(--gold); text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { width: 100%; padding: 18px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 16px; transition: 0.3s; color: black; }
        button:hover { background: #f1c40f; }
        .log-box { margin-top: 20px; max-height: 200px; overflow-y: auto; background: #000; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 13px; color: #00ff00; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="margin-top:0">🔐 Admin Girişi</h2>
        <input type="password" id="adminPass" placeholder="Giriş Şifresini Yazın">
        <button onclick="checkPassword()">PANELİ AÇ</button>
        <p id="loginError" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>

    <div id="admin-panel">
        <h2>🔒 GÜVENLİ KOD ÜRETİCİ</h2>
        <div style="margin-bottom:15px;">
            <label style="font-size:12px; color:#888;">ÜRETİLECEK ADET</label>
            <input type="number" id="count" value="10">
        </div>
        <button id="batchBtn">RASTGELE KODLARI BAS</button>
        <div id="status" style="margin-top:15px; text-align:center; font-weight:bold;"></div>
        <div class="log-box" id="log">İşlem bekleniyor...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuj003_fQ6XQ3qzzl8TfXazbCNHy0TukI",
            databaseURL: "https://karekod-oto-default-rtdb.europe-west1.firebasedatabase.app",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ŞİFRE KONTROLÜ
        window.checkPassword = function() {
            const pass = document.getElementById('adminPass').value;
            // İSTEDİĞİN ŞİFRE:
            if(pass === "eminkaan201151") { 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                document.getElementById('loginError').innerText = "Hatalı Şifre!";
            }
        }

        function generateRandomCode(length) {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let res = '';
            for (let i = 0; i < length; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        document.getElementById('batchBtn').onclick = async () => {
            const count = parseInt(document.getElementById('count').value);
            const status = document.getElementById('status');
            const log = document.getElementById('log');

            status.innerText = "Yükleniyor...";
            log.innerHTML = "";

            for(let i = 0; i < count; i++) {
                let randomCode = generateRandomCode(6);
                try {
                    await set(ref(db, 'aktivasyon_kodlari/' + randomCode), {
                        durum: "aktif", sahibi: "", telefon: "", plaka: "", arac_model: "", logo: "default"
                    });
                    log.innerHTML += `<div>✅ Kod: ${randomCode}</div>`;
                    log.scrollTop = log.scrollHeight;
                } catch (e) { console.error(e); }
            }
            status.innerText = "İŞLEM TAMAMLANDI!";
            status.style.color = "#25d366";
        };
    </script>
</body>
</html>
