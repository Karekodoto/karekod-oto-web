<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Karekod Oto | Kod Üretim</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .admin-card { background: #111; border: 1px solid #d4af37; padding: 30px; border-radius: 15px; width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; }
        button { width: 100%; padding: 15px; background: #d4af37; border: none; font-weight: bold; cursor: pointer; }
        .list { margin-top: 20px; font-size: 12px; color: #888; border-top: 1px dashed #444; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2>Yeni Kod Üret</h2>
        <input type="text" id="newCode" placeholder="Üretilecek Kod (Örn: 888999)" maxlength="6">
        <button id="addBtn">VERİTABANINA EKLE</button>
        <div id="status"></div>
        <div class="list" id="recentCodes">Son eklenenler burada görünecek...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuj003_fQ6XQ3qzzl8TfXazbCNHy0TukI",
            authDomain: "karekod-oto.firebaseapp.com",
            databaseURL: "https://karekod-oto-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "karekod-oto",
            storageBucket: "karekod-oto.firebasestorage.app",
            messagingSenderId: "899053328801",
            appId: "1:899053328801:web:1076904672226ae01513e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('addBtn').onclick = async () => {
            const code = document.getElementById('newCode').value;
            if(code.length !== 6) { alert("Kod 6 haneli olmalı!"); return; }

            try {
                await set(ref(db, 'aktivasyon_kodlari/' + code), {
                    durum: "aktif",
                    sahibi: "",
                    telefon: "",
                    plaka: "",
                    arac_model: "",
                    logo: "default"
                });
                document.getElementById('status').innerText = "Kod " + code + " başarıyla eklendi!";
                document.getElementById('recentCodes').innerHTML += "<br>✅ " + code;
            } catch (e) {
                alert("Hata: " + e.message);
            }
        };
    </script>
</body>
</html>
