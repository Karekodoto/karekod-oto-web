<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP STUDIO V110 - MOBILE PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --panel-bg: #0d0d0d; --card-dark: #151515; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* MOBİL SEKME MENÜSÜ (Sadece Mobilde Görünür) */
        .mobile-tabs { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #111; z-index: 1000; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; color: #666; font-weight: bold; font-size: 14px; cursor: pointer; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* SOL PANEL (KONTROLLER) */
        #panel { width: 420px; background: var(--panel-bg); border-right: 1px solid #222; padding: 20px; overflow-y: auto; height: 100%; }
        
        /* SAĞ PANEL (ÖNİZLEME) */
        #preview-area { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); position: relative; height: 100%; }

        .section-header { color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin: 20px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .control-box { background: var(--card-dark); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
        
        label { font-size: 10px; color: #777; display: block; margin-bottom: 6px; font-weight: bold; }
        input, select { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: white; border-radius: 8px; font-size: 14px; margin-bottom: 10px; outline: none; }
        
        .upload-btn { background: #1a1a1a; border: 2px dashed #333; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 12px; color: #888; }
        
        .btn-save { background: linear-gradient(45deg, #d4af37, #f2d06b); color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* TELEFON SİMÜLATÖRÜ */
        .phone-container { transform: scale(0.9); transition: 0.3s; }
        .phone-frame { width: 340px; height: 680px; background: #000; border: 10px solid #222; border-radius: 50px; position: relative; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
        #iframe-preview { width: 100%; height: 100%; border: none; }

        /* MOBİL GÖRÜNÜM (RESPONSIVE) */
        @media (max-width: 900px) {
            body { flex-direction: column; padding-top: 60px; }
            .mobile-tabs { display: flex; }
            #panel, #preview-area { width: 100%; position: absolute; top: 60px; left: 0; height: calc(100vh - 60px); }
            #preview-area { display: none; } /* Başlangıçta gizle */
            #preview-area.active { display: flex; }
            #panel.hidden { display: none; }
            .phone-container { transform: scale(0.7); } /* Küçük ekranlarda sığdır */
            .control-box:last-child { margin-bottom: 80px; } /* Buton için boşluk */
        }
    </style>
</head>
<body>

<div class="mobile-tabs">
    <div class="tab-btn active" id="tab-edit" onclick="switchTab('edit')"><i class="fas fa-edit"></i> DÜZENLE</div>
    <div class="tab-btn" id="tab-view" onclick="switchTab('view')"><i class="fas fa-eye"></i> ÖNİZLEME</div>
</div>

<div id="panel">
    <h2 style="color:var(--gold); text-align:center; letter-spacing:3px; margin:0 0 20px 0; font-size:18px;">VIP STUDIO V110</h2>
    
    <div class="section-header">1. LOGO & ŞEFFAFLIK</div>
    <div class="control-box">
        <div class="upload-btn" onclick="document.getElementById('logo-upload').click()">LOGO SEÇ</div>
        <input type="file" id="logo-upload" hidden accept="image/*" onchange="processLogo(this)">
        <label style="margin-top:12px;">BEYAZLIK SİL: <span id="th-val" style="color:var(--gold)">0</span></label>
        <input type="range" id="logo-threshold" min="0" max="255" value="0" oninput="applyLogoFix()">
    </div>

    <div class="section-header">2. TEMA</div>
    <div class="control-box">
        <select id="bg-preset" onchange="setPreset(this.value)">
            <option value="animated-gold">Altın Akış</option>
            <option value="rainbow">RGB Renkli</option>
            <option value="solid-black">Saf Siyah</option>
            <option value="solid-white">Saf Beyaz</option>
            <option value="custom">-- Kendi Arka Planın --</option>
        </select>
        <div id="custom-bg-area" style="display:none;">
            <div class="upload-btn" onclick="document.getElementById('bg-upload').click()">GALERİDEN SEÇ</div>
            <input type="file" id="bg-upload" hidden accept="image/*,video/*" onchange="handleBg(this)">
        </div>
    </div>

    <div class="section-header">3. BİLGİLER</div>
    <div class="control-box">
        <input type="text" id="p-name" placeholder="Ad Soyad" value="AD SOYAD" oninput="liveUpdate()">
        <input type="tel" id="p-tel" placeholder="Telefon (05XX...)" oninput="liveUpdate()">
        <input type="text" id="p-insta" placeholder="Instagram (@Kullanıcı)" oninput="liveUpdate()">
    </div>

    <div class="section-header">4. KART & FONT</div>
    <div class="control-box">
        <label>KART ŞEFFAFLIĞI: <span id="op-val" style="color:var(--gold)">0.7</span></label>
        <input type="range" id="p-opacity" min="0" max="1" step="0.01" value="0.7" oninput="liveUpdate()">
        
        <label>YAZI TİPİ</label>
        <select id="p-font" onchange="liveUpdate()">
            <option value="'Montserrat'">Montserrat</option>
            <option value="'Cinzel'">Cinzel</option>
            <option value="'Orbitron'">Orbitron</option>
            <option value="'Bebas Neue'">Bebas Neue</option>
        </select>

        <label>İSİM RENGİ</label>
        <input type="color" id="p-color" value="#d4af37" oninput="liveUpdate()">
    </div>

    <div class="section-header">5. PLAKA</div>
    <div class="control-box">
        <input type="text" id="p-plate" value="34 VIP 01" oninput="liveUpdate()">
        <label style="display:flex; align-items:center; gap:8px; color:#e30a17; font-size:12px;">
            <input type="checkbox" id="red-tr" onchange="liveUpdate()"> KIRMIZI TR (TÜRK BAYRAĞI)
        </label>
    </div>

    <button class="btn-save"><i class="fas fa-check"></i> KAYDET</button>
</div>

<div id="preview-area">
    <div class="phone-container">
        <div class="phone-frame">
            <iframe id="iframe-preview"></iframe>
        </div>
    </div>
</div>

<canvas id="logoCanvas" style="display:none;"></canvas>

<script>
    let originalLogo = null, processedLogo = "", bgData = "", isBgVideo = false, currentPreset = "animated-gold";

    // MOBİL SEKME GEÇİŞİ
    function switchTab(tab) {
        document.getElementById('tab-edit').classList.toggle('active', tab === 'edit');
        document.getElementById('tab-view').classList.toggle('active', tab === 'view');
        document.getElementById('panel').classList.toggle('hidden', tab === 'view');
        document.getElementById('preview-area').classList.toggle('active', tab === 'view');
    }

    function processLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => { originalLogo = img; applyLogoFix(); };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function applyLogoFix() {
        if (!originalLogo) return;
        const th = document.getElementById('logo-threshold').value;
        document.getElementById('th-val').innerText = th;
        const canvas = document.getElementById('logoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = originalLogo.width; canvas.height = originalLogo.height;
        ctx.drawImage(originalLogo, 0, 0);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            if (data[i] > th && data[i+1] > th && data[i+2] > th) data[i+3] = 0;
        }
        ctx.putImageData(imgData, 0, 0);
        processedLogo = canvas.toDataURL();
        liveUpdate();
    }

    function handleBg(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            isBgVideo = file.type.startsWith('video');
            const reader = new FileReader();
            reader.onload = (e) => { bgData = e.target.result; currentPreset = "custom"; liveUpdate(); };
            reader.readAsDataURL(file);
        }
    }

    function setPreset(val) {
        currentPreset = val;
        document.getElementById('custom-bg-area').style.display = (val === 'custom') ? 'block' : 'none';
        liveUpdate();
    }

    function liveUpdate() {
        const op = document.getElementById('p-opacity').value;
        document.getElementById('op-val').innerText = op;
        const d = {
            name: document.getElementById('p-name').value,
            tel: document.getElementById('p-tel').value,
            insta: document.getElementById('p-insta').value.replace('@',''),
            plate: document.getElementById('p-plate').value,
            font: document.getElementById('p-font').value,
            color: document.getElementById('p-color').value,
            redTr: document.getElementById('red-tr').checked
        };

        let bgStyle = "";
        if(currentPreset === "rainbow") bgStyle = "background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradient 8s ease infinite;";
        else if(currentPreset === "animated-gold") bgStyle = "background: linear-gradient(-45deg, #000, #1a1a1a, #d4af37, #000); background-size: 400% 400%; animation: gradient 10s ease infinite;";
        else if(currentPreset === "solid-black") bgStyle = "background: #000;";
        else if(currentPreset === "solid-white") bgStyle = "background: #fff;";

        const doc = `
        <!DOCTYPE html><html><head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Cinzel:wght@900&family=Orbitron:wght@900&family=Bebas+Neue&display=swap" rel="stylesheet">
        <style>
            @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
            body { margin:0; height:100vh; overflow:hidden; display:flex; align-items:center; justify-content:center; ${currentPreset !== 'custom' ? bgStyle : 'background:#000'}; font-family:${d.font}, sans-serif; }
            .bg-custom { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1; }
            .card { 
                width:85vw; max-width:290px; padding:40px 20px; border-radius:40px; text-align:center;
                background: rgba(0,0,0, ${op}); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
                border: ${op > 0 ? '1px solid rgba(255,255,255,0.1)' : 'none'};
            }
            .logo img { max-height:70px; margin-bottom:20px; }
            .plate { background:white; color:black; display:inline-flex; border-radius:8px; overflow:hidden; border:2px solid ${d.color}; margin-bottom:20px; font-weight:900; font-family:Arial; }
            .plate-tr { background:${d.redTr ? '#e30a17' : '#003399'}; color:white; padding:5px 8px; font-size:11px; display:flex; align-items:center; }
            .plate-no { padding:5px 12px; font-size:20px; }
            h1 { font-size:24px; color:${d.color}; text-transform:uppercase; margin:10px 0; }
            .btn-group { display:flex; flex-direction:column; gap:10px; margin-top:20px; }
            .btn { display:flex; align-items:center; justify-content:center; gap:10px; padding:16px; border-radius:20px; text-decoration:none; font-weight:bold; color:white; font-size:15px; }
            .btn-call { background:#2ecc71; }
            .btn-insta { background:linear-gradient(45deg, #f09433, #bc1888); }
        </style>
        </head><body>
            ${currentPreset === 'custom' && bgData ? (isBgVideo ? `<video class="bg-custom" src="${bgData}" autoplay muted loop playsinline></video>` : `<img class="bg-custom" src="${bgData}">`) : ''}
            <div class="card">
                <div class="logo">${processedLogo ? `<img src="${processedLogo}">` : ''}</div>
                <div class="plate"><div class="plate-tr">TR</div><div class="plate-no">${d.plate}</div></div>
                <h1>${d.name}</h1>
                <div class="btn-group">
                    <a href="tel:${d.tel}" class="btn btn-call"><i class="fas fa-phone"></i> SÜRÜCÜYÜ ARA</a>
                    ${d.insta ? `<a href="https://instagram.com/${d.insta}" class="btn btn-insta"><i class="fab fa-instagram"></i> INSTAGRAM</a>` : ''}
                </div>
            </div>
        </body></html>`;
        document.getElementById('iframe-preview').srcdoc = doc;
    }
    liveUpdate();
</script>
</body>
</html>
