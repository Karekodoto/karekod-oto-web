<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>KAREKODOTO | SECURE SIGNATURE EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Cinzel:wght@700&family=Orbitron:wght@700&family=Fira+Sans:wght@700&family=Playfair+Display:wght@700&family=Poppins:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body { -webkit-user-select: none; user-select: none; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; touch-action: manipulation; }
        :root { --gold: linear-gradient(135deg, #d4af37 0%, #f2d06b 50%, #d4af37 100%); --gold-solid: #d4af37; }
        * { box-sizing: border-box; outline: none; }
        body { display: flex; }
        #panel { width: 450px; background: #080808; border-right: 1px solid #1a1a1a; padding: 25px; overflow-y: auto; height: 100vh; scrollbar-width: none; }
        #panel::-webkit-scrollbar { display: none; }
        #preview-area { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a, #000); position: relative; }
        .section-title { font-size: 11px; font-weight: 900; color: var(--gold-solid); letter-spacing: 2px; text-transform: uppercase; margin: 25px 0 12px; display: flex; align-items: center; gap: 10px; border-left: 3px solid var(--gold-solid); padding-left: 10px; }
        .input-group { background: #111; padding: 15px; border-radius: 24px; border: 1px solid #222; margin-bottom: 15px; }
        label { font-size: 10px; color: #777; display: block; margin-bottom: 8px; font-weight: 900; }
        select, input { width: 100%; background: #000; border: 1px solid #333; padding: 14px; color: white; border-radius: 14px; font-size: 14px; margin-bottom: 10px; }
        .upload-btn { background: #000; border: 1px solid #333; padding: 15px; text-align: center; border-radius: 15px; color: #fff; font-size: 12px; font-weight: bold; cursor: pointer; border-style: dashed; }
        .btn-save { background: var(--gold); color: #000; border: none; padding: 22px; width: 100%; border-radius: 20px; font-weight: 900; font-size: 16px; margin-top: 15px; cursor: pointer; text-transform: uppercase; }
        .phone-mockup { width: 310px; height: 630px; background: #000; border: 12px solid #1a1a1a; border-radius: 50px; position: relative; overflow: hidden; }
        #preview-frame { width: 100%; height: 100%; border: none; pointer-events: none; }
        @media (max-width: 900px) { #panel { width: 100%; height: calc(100vh - 75px); } #preview-area { display: none; } #preview-area.active { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: calc(100vh - 75px); z-index: 500; } .mobile-nav { display: flex; position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; border-top: 1px solid #222; } }
        .mobile-nav { display: none; z-index: 1001; justify-content: space-around; align-items: center; }
        .nav-item { flex: 1; text-align: center; color: #555; font-size: 20px; }
        .nav-item.active { color: var(--gold-solid); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="panel">
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color:#fff; margin:0; letter-spacing:8px; font-family:'Cinzel'; font-size: 24px;">KAREKOD<span style="color:var(--gold-solid)">OTO</span></h1>
        <span style="font-size: 9px; color: #555; letter-spacing: 4px; font-weight: 900;">SECURE EDITION</span>
    </div>

    <div class="section-title">LOGO VE MARKA</div>
    <div class="input-group">
        <div class="upload-btn" onclick="document.getElementById('logo-in').click()"><i class="fas fa-camera"></i> LOGO YÜKLE</div>
        <input type="file" id="logo-in" hidden accept="image/*" onchange="autoLoadLogo(this)">
        <label>BOYUT: <input type="range" id="logo-size" min="40" max="140" value="85" oninput="refresh()"></label>
        <label>TEMİZLE: <input type="range" id="logo-th" min="0" max="250" value="230" oninput="manualFix()"></label>
    </div>

    <div class="section-title">SÜRÜCÜ BİLGİLERİ</div>
    <div class="input-group">
        <input type="text" id="name" placeholder="AD SOYAD" value="AD SOYAD" oninput="refresh()">
        <input type="tel" id="phone" placeholder="TELEFON" oninput="refresh()">
        <input type="text" id="insta" placeholder="INSTAGRAM" oninput="refresh()">
        <select id="blood" onchange="refresh()">
            <option value="">Kan Grubu Seçin</option>
            <option value="A Rh+">A Rh+</option><option value="A Rh-">A Rh-</option>
            <option value="B Rh+">B Rh+</option><option value="B Rh-">B Rh-</option>
            <option value="AB Rh+">AB Rh+</option><option value="AB Rh-">AB Rh-</option>
            <option value="O Rh+">O Rh+</option><option value="O Rh-">O Rh-</option>
        </select>
    </div>

    <div class="section-title">TASARIM AYARLARI</div>
    <div class="input-group">
        <input type="text" id="plate" placeholder="PLAKA" oninput="refresh()">
        <select id="theme-sel" onchange="updateTheme(this.value)">
            <option value="rgb">Cyber Neon</option>
            <option value="black">Mat Siyah</option>
            <option value="white">İnci Beyazı</option>
            <option value="gold">Lüks Altın</option>
        </select>
        <select id="font-sel" onchange="refresh()">
            <option value="'Montserrat'">Montserrat</option>
            <option value="'Cinzel'">Cinzel</option>
            <option value="'Orbitron'">Orbitron</option>
            <option value="'Bebas Neue'">Bebas Neue</option>
        </select>
        <label>RENK: <input type="color" id="text-color-picker" value="#d4af37" oninput="refresh()"></label>
    </div>

    <button class="btn-save" onclick="saveProfile()">PROFİLİ AKTİF ET VE KAYDET</button>
</div>

<div id="preview-area">
    <div class="phone-mockup"><iframe id="preview-frame"></iframe></div>
</div>

<div class="mobile-nav">
    <div class="nav-item active" id="btn-edit" onclick="setTab('edit')"><i class="fas fa-edit"></i></div>
    <div class="nav-item" id="btn-prev" onclick="setTab('preview')"><i class="fas fa-eye"></i></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { doc, setDoc, getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Senin kopyalayıp attığın en sağlam config:
    const firebaseConfig = {
      apiKey: "AIzaSyCuj003_fQ6xQ3qzzl8TfXazbCNHy0TukI",
      authDomain: "karekod-oto.firebaseapp.com",
      databaseURL: "https://karekod-oto-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "karekod-oto",
      storageBucket: "karekod-oto.firebasestorage.app",
      messagingSenderId: "899053328801",
      appId: "1:899053328801:web:1076904672226ae01513e0",
      measurementId: "G-3XF8Z60RM3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.saveProfile = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if(!code) { alert("Hata: URL'de kod bulunamadı! Lütfen ?code=TEST1234 ekleyerek deneyin."); return; }

        const data = {
            n: document.getElementById('name').value,
            p: document.getElementById('phone').value,
            i: document.getElementById('insta').value,
            pl: document.getElementById('plate').value,
            b: document.getElementById('blood').value,
            t: document.getElementById('theme-sel').value,
            f: document.getElementById('font-sel').value,
            c: document.getElementById('text-color-picker').value,
            isActivated: true,
            createdAt: new Date().toISOString()
        };

        try {
            await setDoc(doc(db, "qr_codes", code), data);
            alert("Sistem Başarıyla Aktif Edildi! Bilgileriniz Buluta İşlendi.");
            window.location.href = "profil-goruntule.html?code=" + code;
        } catch (e) { 
            console.error(e);
            alert("Kritik Hata: " + e.message); 
        }
    };
</script>

<script>
    let processedLogo = ""; let imgObj = null; let theme = "rgb";
    function setTab(t) {
        document.getElementById('panel').style.display = t==='edit'?'block':'none';
        document.getElementById('preview-area').classList.toggle('active', t==='preview');
        document.getElementById('btn-edit').classList.toggle('active', t==='edit');
        document.getElementById('btn-prev').classList.toggle('active', t==='preview');
    }
    function autoLoadLogo(el) {
        if(el.files[0]) { let r = new FileReader(); r.onload=(e)=>{imgObj=new Image(); imgObj.onload=manualFix; imgObj.src=e.target.result;}; r.readAsDataURL(el.files[0]); }
    }
    function manualFix() {
        if(!imgObj) return; let c = document.getElementById('canvas'); let ctx = c.getContext('2d');
        c.width=imgObj.width; c.height=imgObj.height; ctx.drawImage(imgObj,0,0);
        let d = ctx.getImageData(0,0,c.width,c.height); let th = document.getElementById('logo-th').value;
        for(let i=0; i<d.data.length; i+=4) { if(d.data[i]>th && d.data[i+1]>th && d.data[i+2]>th) d.data[i+3]=0; }
        ctx.putImageData(d,0,0); processedLogo = c.toDataURL(); refresh();
    }
    function updateTheme(v) { theme = v; refresh(); }
    function refresh() {
        let d = { n: document.getElementById('name').value, p: document.getElementById('phone').value, i: document.getElementById('insta').value, pl: document.getElementById('plate').value, b: document.getElementById('blood').value };
        let font = document.getElementById('font-sel').value;
        let color = document.getElementById('text-color-picker').value;
        let size = document.getElementById('logo-size').value;
        let bg = "linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab)";
        if(theme==='black') bg="#000"; if(theme==='white') bg="#fff"; if(theme==='gold') bg="linear-gradient(45deg, #000, #d4af37)";

        const docContent = `
        <html><head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Cinzel:wght@700&family=Orbitron:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">
        <style>
            body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center; background:${bg}; font-family:${font}, sans-serif; overflow:hidden; }
            .card { width:260px; padding:30px; border-radius:35px; background:rgba(0,0,0,0.85); text-align:center; color:#fff; border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); }
            .logo img { max-height:${size}px; margin-bottom:15px; }
            .plate { background:#fff; color:#000; padding:5px 12px; border-radius:6px; font-weight:900; display:inline-block; margin-bottom:15px; border-left:12px solid #003399; font-family:'Arial'; }
            h1 { color:${color}; font-size:20px; text-transform:uppercase; margin:10px 0; }
            .btn { display:block; padding:13px; margin:8px 0; border-radius:15px; text-decoration:none; font-weight:900; background:${color}; color:#000; font-size:12px; text-transform:uppercase; }
            .btn-wp { background:#25D366; color:#fff; }
            .blood { color:#ff4d4d; font-size:11px; font-weight:bold; margin-bottom:10px; }
        </style></head>
        <body>
            <div class="card">
                <div class="logo">${processedLogo?`<img src="${processedLogo}">`:''}</div>
                <div class="plate">${d.pl || 'PLAKA BEKLENİYOR'}</div>
                <h1>${d.n}</h1>
                ${d.b?`<div class="blood"><i class="fas fa-heartbeat"></i> ${d.b}</div>`:''}
                ${d.p?`<div class="btn"><i class="fas fa-phone"></i> SÜRÜCÜYÜ ARA</div>`:''}
                ${d.p?`<div class="btn btn-wp"><i class="fab fa-whatsapp"></i> WHATSAPP MESAJ</div>`:''}
                ${d.i?`<div class="btn" style="background:linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color:#fff;"><i class="fab fa-instagram"></i> INSTAGRAM</div>`:''}
            </div>
        </body></html>`;
        document.getElementById('preview-frame').srcdoc = docContent;
    }
    refresh();
</script>
</body>
</html>
