<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAREKODOTO | SÜRÜCÜ PROFİLİ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Cinzel:wght@700&family=Orbitron:wght@700&family=Fira+Sans:wght@700&family=Playfair+Display:wght@700&family=Poppins:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        @keyframes g {0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}}
        
        body { 
            margin:0; padding:0; height:100vh; width:100%;
            display:flex; align-items:center; justify-content:center; 
            background:#000; overflow:hidden; color:#fff;
        }

        /* Dinamik Arka Planlar */
        .bg-video, .bg-img { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1; }
        .bg-animate { 
            position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;
            background-size: 400% 400%; animation: g 10s ease infinite;
        }

        .card { 
            width:85vw; max-width:320px; padding:40px 25px; 
            border-radius:45px; text-align:center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: none; /* Veri gelene kadar gizli */
        }

        .logo img { max-width: 100%; margin-bottom:20px; }
        
        .plate { 
            background:white; color:black; display:inline-flex; 
            border-radius:8px; overflow:hidden; border:2px solid #222; 
            margin-bottom:20px; font-weight:900; height:42px;
        }
        .plate-tr { color:white; width:30px; font-size:10px; display:flex; align-items:center; justify-content:center; }
        .plate-no { padding:0 15px; font-size:18px; line-height:42px; }

        h1 { font-size:26px; text-transform:uppercase; margin:15px 0; letter-spacing: 1px; }
        
        .blood-box { 
            color: #ff0000; font-size: 12px; font-weight: 900; 
            margin: 20px 0; border-top: 1px solid rgba(255,255,255,0.1); 
            border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 0; 
            display:flex; align-items:center; justify-content:center; gap:8px; 
        }

        .btns { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .btn { 
            display:flex; align-items:center; justify-content:center; gap:10px; 
            padding:18px; border-radius:22px; color:#000; font-size:14px; 
            font-weight:900; text-transform:uppercase; text-decoration:none; 
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-wp { background:#25D366 !important; color:white !important; }
        .btn-insta { background:#E1306C !important; color:white !important; }

        #loading { font-family: 'Orbitron'; font-size: 12px; letter-spacing: 3px; color: #d4af37; }
    </style>
</head>
<body>

    <div id="loading">SİSTEM YÜKLENİYOR...</div>

    <div id="main-content"></div> <div class="card" id="profile-card">
        <div class="logo" id="user-logo"></div>
        <div class="plate" id="plate-area">
            <div class="plate-tr" id="tr-color">TR</div>
            <div class="plate-no" id="plate-text"></div>
        </div>
        <h1 id="user-name"></h1>
        <div id="blood-area"></div>
        <div class="btns" id="action-btns"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { doc, getDoc, getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCujO03_fQ6xQ3qzzl8TfXazbCNHy0TukI",
      authDomain: "karekod-oto.firebaseapp.com",
      projectId: "karekod-oto",
      storageBucket: "karekod-oto.firebasestorage.app",
      messagingSenderId: "899053328801",
      appId: "1:899053328801:web:1076904672226ae01513e0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadProfile() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (!code) {
            document.getElementById('loading').innerText = "GEÇERSİZ KOD!";
            return;
        }

        try {
            const docRef = doc(db, "qr_codes", code);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                renderProfile(data);
            } else {
                document.getElementById('loading').innerText = "KAYIT BULUNAMADI!";
            }
        } catch (e) {
            document.getElementById('loading').innerText = "BAĞLANTI HATASI!";
        }
    }

    function renderProfile(data) {
        document.getElementById('loading').style.display = 'none';
        const card = document.getElementById('profile-card');
        const main = document.getElementById('main-content');

        // 1. Arka Plan Ayarı
        if (data.theme === 'custom' && data.bgFileUrl) {
            if (data.isVideo) {
                main.innerHTML = `<video class="bg-video" src="${data.bgFileUrl}" autoplay muted loop playsinline></video>`;
            } else {
                main.innerHTML = `<img class="bg-img" src="${data.bgFileUrl}">`;
            }
        } else {
            let bgStyle = "";
            if(data.theme === 'rgb') bgStyle = "linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab)";
            if(data.theme === 'gold') bgStyle = "linear-gradient(-45deg, #000, #1a1a1a, #d4af37, #000)";
            if(data.theme === 'black') bgStyle = "#000";
            if(data.theme === 'white') bgStyle = "#fff";
            main.innerHTML = `<div class="bg-animate" style="background: ${bgStyle}"></div>`;
        }

        // 2. Kart Stili
        card.style.fontFamily = `${data.font}, sans-serif`;
        let cardBg = data.theme === 'white' ? `rgba(255,255,255,${data.opacity})` : `rgba(0,0,0,${data.opacity})`;
        card.style.background = cardBg;
        card.style.backdropFilter = `blur(${data.opacity * 20}px)`;
        card.style.webkitBackdropFilter = `blur(${data.opacity * 20}px)`;
        card.style.display = 'block';
        if (data.theme === 'white') card.style.color = '#000';

        // 3. İçerik Dolumu
        if (data.userLogo) {
            document.getElementById('user-logo').innerHTML = `<img src="${data.userLogo}" style="max-height:${data.logoSize}px">`;
        }
        
        document.getElementById('plate-text').innerText = data.plate || "PLAKA YOK";
        document.getElementById('tr-color').style.background = data.redPlate ? "#e30a17" : "#003399";
        
        const nameEl = document.getElementById('user-name');
        nameEl.innerText = data.fullName;
        nameEl.style.color = data.color;

        if (data.blood) {
            document.getElementById('blood-area').innerHTML = `<div class="blood-box"><i class="fas fa-heartbeat"></i> KAN GRUBU: ${data.blood}</div>`;
        }

        // 4. Butonlar
        let btnsHtml = "";
        if (data.phone) {
            btnsHtml += `<a href="tel:${data.phone}" class="btn" style="background:${data.color}"><i class="fas fa-phone-alt"></i> SÜRÜCÜYÜ ARA</a>`;
            btnsHtml += `<a href="https://wa.me/${data.phone.replace(/\s/g,'')}" class="btn btn-wp"><i class="fab fa-whatsapp"></i> WHATSAPP</a>`;
        }
        if (data.instagram) {
            btnsHtml += `<a href="https://instagram.com/${data.instagram.replace('@','')}" class="btn btn-insta"><i class="fab fa-instagram"></i> INSTAGRAM</a>`;
        }
        document.getElementById('action-btns').innerHTML = btnsHtml;
    }

    loadProfile();
</script>
</body>
</html>
