<script type="module">
    // ... firebase importları aynı kalıyor ...

    async function loadProfile() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if(!code) return;

        const snap = await getDoc(doc(db, "qr_codes", code));
        if(!snap.exists()) return;

        const data = snap.data();
        
        // GÖRSEL KONTROLÜ VE YÜKLEME (BURASI KRİTİK)
        const bgLayer = document.getElementById('bg-container');
        
        // Eğer Cloudinary URL'si varsa kullan
        if(data.bgFileUrl && data.bgFileUrl !== "") {
            // Video mu görsel mi kontrol et (Cloudinary bazen video uzantısını değiştirebilir)
            const isVid = data.isVideo || data.bgFileUrl.includes("/video/upload/");
            
            if(isVid) {
                bgLayer.innerHTML = `<video class="bg-layer" src="${data.bgFileUrl}" autoplay muted loop playsinline></video>`;
            } else {
                bgLayer.innerHTML = `<img class="bg-layer" src="${data.bgFileUrl}">`;
            }
        } else {
            // Tema ayarları (Varsayılanlar)
            let style = "background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: g 10s ease infinite;";
            if(data.theme === 'black') style = "background: #000;";
            if(data.theme === 'white') style = "background: #fff;";
            if(data.theme === 'gold') style = "background: linear-gradient(-45deg, #000, #1a1a1a, #d4af37, #000); background-size: 400% 400%; animation: g 15s ease infinite;";
            document.body.style.cssText = style;
        }

        // LOGO KONTROLÜ
        if(data.userLogo && data.userLogo !== "") {
            document.getElementById('user-logo').innerHTML = `<img src="${data.userLogo}" style="max-height:${data.logoSize || 85}px; width: auto; object-fit: contain;">`;
        }

        // ... Diğer plaka, isim ve buton kodları aynı kalıyor ...
        // Sadece yukarıdaki bg ve logo kısımlarını "boş veri" gelme ihtimaline karşı sağlama aldık.
    }
</script>
